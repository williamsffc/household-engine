# Discrepancy Detection Rules
rules:
  duplicate_detection:
    amount_tolerance: 0.50      # dollars
    day_tolerance: 2            # days
    enabled: true

  subscription_change:
    variance_threshold: 0.15    # coefficient of variation — below this = subscription-like
    change_percent: 0.05        # flag if amount changed by more than 5%
    min_occurrences: 2          # merchant must appear at least this many times
    enabled: true

  large_transaction:
    threshold: 200.00           # flag transactions above this amount
    enabled: true

  recurring_detection:
    min_occurrences: 2          # minimum times a merchant must appear
    variance_threshold: 0.15    # coefficient of variation — below this = recurring-like
    enabled: true

  refund_anomaly:
    threshold: 50.00            # Flag unusually large refunds (credits)
    enabled: true

  velocity_anomaly:
    z_threshold: 2.0            # Standard deviations above mean to flag
    min_months: 2               # Minimum historical months required before flagging
    enabled: true
