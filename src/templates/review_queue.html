{% extends "base.html" %}
{% block content %}
<header class="page-header">
  <h1 class="page-title">Review Queue</h1>
  <div class="page-subtitle">Review payroll drafts. Approve or reject.</div>
</header>

<div id="rq-status"></div>

<section class="grid grid--one">
  <div class="panel">
    <div class="panel__header">
      <div class="panel__title">Upload</div>
      <div class="panel__meta">Add a paystub for review</div>
    </div>
    <div id="payroll-upload"></div>
    <div class="callout callout--info">
      <div class="callout__title">About <code>in_review</code></div>
      <div class="callout__body">
        Items here are <b>draft payroll</b>. They don’t affect analytics until approved.
      </div>
    </div>
  </div>
</section>

<section class="grid grid--two">
  <div class="panel">
    <div class="panel__header">
      <div class="panel__title">In review</div>
      <div class="panel__meta" id="rq-meta"></div>
    </div>
    <div class="table" id="rq-list"></div>
  </div>

  <div class="panel">
    <div class="panel__header">
      <div class="panel__title">Details</div>
      <div class="panel__meta" id="rq-detail-meta"></div>
    </div>
    <div id="rq-detail" class="table"></div>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script src="/static/js/review_queue.js?v=31"></script>
{% endblock %}
