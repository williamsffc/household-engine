{% extends "base.html" %}
{% block content %}
<header class="page-header">
  <h1 class="page-title">🧾 Payroll</h1>
  <div class="page-subtitle">Browse paystubs by member and status</div>
</header>

<div id="payroll-status" role="status" aria-live="polite"></div>

<section class="grid grid--one">
  <div class="panel payroll-view-panel">
    <div class="panel__header">
      <div class="panel__title">🔎 View</div>
      <div class="panel__meta">Household vs member</div>
    </div>
    <div class="payroll-view">
      <div class="payroll-view__controls">
        <div class="payroll-view__field">
          <label class="payroll-view__label" for="payroll-member">Member</label>
          <select id="payroll-member" name="member_id" class="payroll-view__input" autocomplete="off"></select>
        </div>
        <div class="payroll-view__field">
          <label class="payroll-view__label" for="payroll-status-filter">Status</label>
          <select id="payroll-status-filter" name="status" class="payroll-view__input" autocomplete="off">
            <option value="">All</option>
            <option value="approved">Approved (canonical)</option>
            <option value="draft">Draft / in_review</option>
            <option value="rejected">Rejected</option>
          </select>
        </div>
      </div>
      <div class="payroll-view__note">
        <div class="payroll-view__note-label">Decision scope</div>
        <div class="payroll-view__note-body">
          Approved payroll is analytics-eligible. Draft payroll is usually handled in <a href="/review-queue">Review Queue</a>.
        </div>
      </div>
    </div>
  </div>
</section>

<section class="grid grid--two">
  <div class="panel">
    <div class="panel__header">
      <div class="panel__title">🧾 Paystubs</div>
      <div class="panel__meta" id="payroll-meta"></div>
    </div>
    <div class="table" id="payroll-list"></div>
  </div>

  <div class="panel">
    <div class="panel__header">
      <div class="panel__title">🔎 Details</div>
      <div class="panel__meta" id="payroll-detail-meta"></div>
    </div>
    <div id="payroll-detail" class="table"></div>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script src="/static/js/payroll.js?v=31"></script>
{% endblock %}
